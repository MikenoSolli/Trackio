name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  # Opts into the newer Node.js runner to clear deprecation warnings
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest

      - name: Debug secrets
        run: |
          echo "DATABASE_URL present: ${{ secrets.DATABASE_URL != '' }}"
          echo "REDIS_URL present: ${{ secrets.REDIS_URL != '' }}"
          echo "SESSION_SECRET present: ${{ secrets.SESSION_SECRET != '' }}"
          echo "Full DATABASE_URL: ${{ secrets.DATABASE_URL }}"
          echo "SERVER_IP present: ${{ secrets.SERVER_IP != ''}}"

      - name: Build and push
        run: |
          TAGS=$(echo "${{ steps.meta.outputs.tags }}" | tr ',' '\n')

          docker build --no-cache \
            --build-arg DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --build-arg REDIS_URL="${{ secrets.REDIS_URL }}" \
            --build-arg SESSION_SECRET="${{ secrets.SESSION_SECRET }}" \
            --progress=plain \
            -t test-build .

          for TAG in $TAGS; do
            docker tag test-build "$TAG"
            docker push "$TAG"
          done

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Update Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Navigate to your project folder on the VPS
            cd /home/apps/trackio

            # Pull the latest image from GHCR
            docker compose pull app

            # Restart the app container with the new image
            docker compose up -d app

            # Optional: Clean up old unused images to save disk space
            docker image prune -f
